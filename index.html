<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 페이지로 이동 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #03C75A;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .naver-logo {
      width: 52px; height: 52px;
      background: #03C75A;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; font-weight: 900; color: #fff;
    }
    h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
    .desc { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.6; }

    /* 단계 안내 */
    .steps {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 20px;
      text-align: left;
    }
    .steps-title {
      font-size: 13px; font-weight: 700; color: #333;
      margin-bottom: 12px;
    }
    .step {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      min-width: 22px; height: 22px;
      background: #03C75A; color: #fff;
      border-radius: 50%;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    .step-text { font-size: 13px; color: #444; line-height: 1.5; }
    .step-text strong { color: #111; }

    .btn-copy {
      display: block; width: 100%; padding: 15px;
      background: #03C75A; color: #fff;
      font-size: 16px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      text-decoration: none; margin-bottom: 10px;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #02b350; }
    .btn-copy.copied { background: #02944a; }

    .btn-web {
      display: block; width: 100%; padding: 14px;
      background: #f0f0f0; color: #555;
      font-size: 14px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-web:hover { background: #e5e5e5; }

    .tip {
      margin-top: 16px; padding: 11px 13px;
      background: #f0faf4; border-radius: 10px;
      font-size: 12px; color: #555; line-height: 1.6; text-align: left;
    }
    .tip strong { color: #03C75A; }

    /* 복사 완료 토스트 */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #222; color: #fff;
      padding: 12px 24px; border-radius: 50px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="card">
  <div class="naver-logo">N</div>
  <h1>네이버 앱으로 이동하기</h1>
  <p class="desc">인스타그램에서는 자동 이동이 제한돼요.<br>아래 방법으로 간편하게 열 수 있어요!</p>

  <div class="steps">
    <div class="steps-title">📋 2단계로 열기</div>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">아래 <strong>링크 복사</strong> 버튼을 눌러주세요</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>크롬 또는 네이버 앱</strong> 주소창에 붙여넣기 후 이동</div>
    </div>
  </div>

  <button class="btn-copy" id="btnCopy" onclick="copyLink()">🔗 링크 복사하기</button>
  <a class="btn-web" id="btnWeb" href="#">브라우저로 바로 열기</a>

  <div class="tip">
    💡 <strong>Tip.</strong> 크롬 앱 주소창에 붙여넣으면 네이버 앱이 자동으로 열려요!
  </div>
</div>

<div class="toast" id="toast">✅ 링크가 복사됐어요!</div>

<script>
// ── 상품 링크 목록 ─────────────────────────────────
var PRODUCTS = {
  '1': 'https://smartstore.naver.com/highqual_japan/products/12454569432',
  // '2': 'https://smartstore.naver.com/...',
};
// ──────────────────────────────────────────────────

var params    = new URLSearchParams(window.location.search);
var pNum      = params.get('p') || '1';
var STORE_URL = PRODUCTS[pNum] || PRODUCTS['1'];

// 브라우저로 바로 열기 버튼
document.getElementById('btnWeb').href = STORE_URL;

function copyLink() {
  var btn = document.getElementById('btnCopy');

  // 클립보드 복사
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(STORE_URL).then(showToast);
  } else {
    // 구형 방식 fallback
    var ta = document.createElement('textarea');
    ta.value = STORE_URL;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  }
}

function showToast() {
  var btn   = document.getElementById('btnCopy');
  var toast = document.getElementById('toast');
  btn.textContent = '✅ 복사 완료!';
  btn.classList.add('copied');
  toast.classList.add('show');
  setTimeout(function() {
    toast.classList.remove('show');
    btn.textContent = '🔗 링크 복사하기';
    btn.classList.remove('copied');
  }, 2500);
}
</script>
</body>
</html>
